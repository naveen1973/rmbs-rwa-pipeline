function svgLine(labels,series){var W=560,H=240,pl=44,pr=12,pt=16,pb=28;var iw=W-pl-pr,ih=H-pt-pb;
 var allv=[];series.forEach(function(s){s.data.forEach(function(v){if(v!=null)allv.push(v);});});

 var g='';for(var t=0;t<=4;t++){var yv=mn+rng*t/4;var y=Y(yv);g+='<line x1="'+pl+'" y1="'+y+'" x2="'+(W-pr)+'" y2="'+y+'" stroke="#eef2f8"/>'+'<text x="'+(pl-6)+'" y="'+(y+3)+'" text-anchor="end" font-size="10" fill="#9aa6b2">'+yv.toFixed(0)+'%</text>';}
 labels.forEach(function(l,i){g+='<text x="'+X(i)+'" y="'+(H-8)+'" text-anchor="middle" font-size="10" fill="#6b7280">'+l+'</text>';});
 series.forEach(function(s){var pts=[];s.data.forEach(function(v,i){if(v!=null)pts.push(X(i)+','+Y(v));});
  g+='<polyline fill="none" stroke="'+s.c+'" stroke-width="2.5" points="'+pts.join(' ')+'"/>';

function svgStacked(periods,order,dhist){var W=560,H=240,pl=10,pr=10,pt=10,pb=26;var iw=W-pl-pr,ih=H-pt-pb;

   g+='<rect x="'+x+'" y="'+y+'" width="'+bw+'" height="'+h+'" fill="'+PAL[bi%PAL.length]+'"/>';acc+=v;});

   var bs=Math.max(.10,1-1/nl);var sv=Math.min(1,bs*sev);el+=bb*Math.min(1,pdF(mm)*cdr)*sv;}
  return{bal:b,el:el,uw:uw,lossRate:el/b*100,uwPct:uw/b*100,cover:el/support*100,wltv:wltv/b*100};}
 function draw(){var hpi=+document.getElementById('s_hpi').value,cdr=+document.getElementById('s_cdr').value,sev=+document.getElementById('s_sev').value;
  document.getElementById('v_hpi').textContent=hpi+'%';document.getElementById('v_cdr').textContent=cdr.toFixed(2)+'x';document.getElementById('v_sev').textContent=sev.toFixed(2)+'x';
  var r=calc(hpi,cdr,sev);
  document.getElementById('stresskpi').innerHTML=kpi('Stressed WA LTV',r.wltv.toFixed(1)+'%','')
   +kpi('% Underwater',r.uwPct.toFixed(1)+'%','LTV > 100%')+kpi('Expected Loss',gbp(r.el),'modelled')
   +kpi('Loss Rate',r.lossRate.toFixed(2)+'%','of balance')+kpi('Loss vs Support',r.cover.toFixed(0)+'%',r.cover<100?'absorbed by juniors':'breaches Class A');
  var cls=r.cover<60?'good':r.cover<100?'warn':'bad';
  document.getElementById('cov').innerHTML='<div class="bigval">'+r.cover.toFixed(0)+'%</div><div class="pill '+cls+'" style="margin-top:8px">'+(r.cover<100?'Class A principal protected':'Losses reach Class A')+'</div><div class="hint" style="margin-top:8px">Modelled loss '+gbp(r.el)+' vs credit support '+gbp(support)+'</div>';
  var xs=[-40,-30,-20,-10,0,10];var pts=xs.map(function(x){return {k:x+'%',bal:calc(x,cdr,sev).lossRate};});
  var mx=Math.max.apply(null,pts.map(function(p){return p.bal;}))||1;
  document.getElementById('sens').innerHTML='<div class="hb">'+pts.map(function(p){var w=(p.bal/mx*100).toFixed(1);
   return '<div class="hbrow"><div class="hblbl">HPI '+p.k+'</div><div class="hbtrack"><div class="hbfill" style="width:'+w+'%;background:#c62828"></div></div><div class="hbval">'+p.bal.toFixed(2)+'%</div></div>';}).join('')+'</div>';}
 ['s_hpi','s_cdr','s_sev'].forEach(function(id){document.getElementById(id).oninput=draw;});draw();};
R[0]();
}catch(err){document.getElementById('p0').innerHTML='<div class="fallback">Error rendering: '+err.message+'</div>';}
